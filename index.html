<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 첫 웹사이트</title>
    <style>
        /* 기본 스타일 리셋 및 배경 설정 */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* 중앙 카드 컨테이너 */
        .card {
            background-color: #1e1e1e;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 400px;
            width: 100%;
            border: 1px solid #333;
        }

        /* 프로필 이미지 아이콘 역할 */
        .profile-img {
            width: 100px;
            height: 100px;
            background: linear-gradient(45deg, #007bff, #00ff88);
            border-radius: 50%;
            margin: 0 auto 20px;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #ffffff;
        }

        p {
            font-size: 16px;
            color: #a0a0a0;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* 버튼 스타일 */
        .btn {
            display: inline-block;
            text-decoration: none;
            background-color: #007bff;
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        /* 버튼에 마우스 올렸을 때 효과 */
        .btn:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 123, 255, 0.4);
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="profile-img"></div>
        <h1>안녕하세요, 반갑습니다! 👋</h1>
        <p>코랩에서 코딩을 시작해 진짜 웹사이트 제작까지 도전하고 있는 예비 개발자입니다. 앞으로 멋진 기능들을 하나씩 추가해 나갈 예정이에요.</p>
        <a href="https://github.com" target="_blank" class="btn">내 깃허브 방문하기</a>
    </div>

</body>
</html>
